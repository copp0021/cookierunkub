<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจัดการสินค้า .benz บน GitHub</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }

    h2 {
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      padding-bottom: 10px;
      margin-top: 0;
    }

    .top-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
      margin-top: 20px;
    }

    button {
      border: none;
      padding: 14px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      color: white;
      transition: 0.3s;
      text-align: center;
    }

    .btn-load { background: #34495e; }
    .btn-load:hover { background: #2c3e50; }
    
    .btn-upload { background: #e67e22; }
    .btn-upload:hover { background: #d35400; }

    button:disabled {
      background: #b2bec3 !important;
      cursor: not-allowed;
    }

    .status-msg {
      margin-bottom: 15px;
      font-size: 15px;
      font-weight: bold;
      padding: 10px;
      border-radius: 6px;
      background: #fdfbfb;
      border: 1px dashed #ddd;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      margin-bottom: 15px;
    }

    input[type="text"].search-input, select {
      padding: 11px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
      width: 100%;
      box-sizing: border-box;
    }

    .summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .badge {
      background: #eef1f5;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      vertical-align: top;
    }

    th {
      background-color: #34495e;
      color: white;
    }

    tr:hover { background-color: #f7f7f7; }

    .preview-img {
      width: 90px;
      height: 90px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid #ddd;
    }

    .no-img {
      width: 90px;
      height: 90px;
      border-radius: 6px;
      background: #f1f1f1;
      color: #e74c3c;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      border: 1px dashed #ccc;
    }

    .tag-badge {
      display: inline-block;
      padding: 5px 8px;
      margin: 2px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      color: white;
    }

    .tag-P { background-color: #e74c3c; }
    .tag-T { background-color: #2ecc71; }
    .tag-C { background-color: #9b59b6; }
    .tag-code { background-color: #e67e22; }

    .display-name { font-weight: bold; color: #2c3e50; margin-bottom: 6px; }
    .file-name { font-size: 12px; color: #7f8c8d; word-break: break-all; }
    
    .status-buttons { display: flex; gap: 6px; margin-top: 8px; }
    .btn-status { color: #333; padding: 8px 10px; font-size: 13px; border-radius: 5px; flex: 1; }
    .btn-available { background: #ddffdf; color: #006b12; }
    .btn-sold { background: #ffdddd; color: #a10000; }
    .active-available { outline: 3px solid #00a326; }
    .active-sold { outline: 3px solid #d00000; }
    .warn { color: #e74c3c; font-weight: bold; font-size: 13px; margin-top: 5px; }

    @media (max-width: 800px) {
      .top-actions { grid-template-columns: 1fr; }
      .search-row { grid-template-columns: 1fr; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { background: #fff; margin-bottom: 14px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; }
      td { border: none; padding: 8px 0; }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📦 ระบบจัดการสินค้าจาก GitHub</h2>

  <div class="top-actions">
    <button class="btn-load" id="loadGitBtn" onclick="loadFromGitHub()">
      🔄 1. ดึงข้อมูลจาก GitHub
    </button>
    
    <input type="file" id="fileUploadInput" multiple accept=".png,.benz" style="display: none;" onchange="handleFileUpload(event)">
    <button class="btn-upload" id="uploadBtn" onclick="document.getElementById('fileUploadInput').click()">
      ➕ 2. เพิ่มไฟล์ .benz / .png
    </button>
  </div>

  <div id="statusMsg" class="status-msg">สถานะ: พร้อมทำงาน...</div>

  <div class="search-row">
    <input type="text" id="searchInput" class="search-input" placeholder="ค้นหา เช่น ขนมปัง เป๋าตัง มีด LYNCZ7544 หรือ 191">
    <select id="filterStatus">
      <option value="all">แสดงทั้งหมด</option>
      <option value="available">ยังไม่ขาย</option>
      <option value="sold">ขายแล้ว</option>
    </select>
  </div>

  <div class="summary">
    <div class="badge">ไฟล์ .benz: <span id="benzCount">0</span></div>
    <div class="badge">รูปภาพ .png: <span id="pngCount">0</span></div>
    <div class="badge">ยังไม่ขาย: <span id="availableCount">0</span></div>
    <div class="badge">ขายแล้ว: <span id="soldCount">0</span></div>
  </div>

  <table id="resultTable" style="display:none;">
    <thead>
      <tr>
        <th>รูปภาพ</th>
        <th>ข้อมูลสินค้า</th>
        <th>Tags</th>
        <th>สถานะ (เซฟในเครื่อง)</th>
      </tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>
</div>

<script>
  // ==========================================
  // ⚙️ ตั้งค่า GitHub ของคุณที่นี่ (Hardcode)
  // ==========================================
  const GITHUB_OWNER = "copp0021"; // เปลี่ยนเป็น Username ของคุณ เช่น "somchai"
  const GITHUB_REPO = "cookierunkub"; // เปลี่ยนเป็นชื่อ Repo ของคุณ เช่น "my-benz-shop"
  const GITHUB_TOKEN = "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"; // เปลี่ยนเป็น Token ของคุณ
  // ==========================================

  const pngMap = new Map();
  let benzFiles = [];

  const searchInput = document.getElementById("searchInput");
  const filterStatus = document.getElementById("filterStatus");
  const statusMsg = document.getElementById("statusMsg");
  const loadGitBtn = document.getElementById("loadGitBtn");
  const uploadBtn = document.getElementById("uploadBtn");

  searchInput.addEventListener("input", renderTable);
  filterStatus.addEventListener("change", renderTable);

  async function loadFromGitHub() {
    if (GITHUB_OWNER === "YOUR_USERNAME_HERE" || GITHUB_REPO === "YOUR_REPO_NAME_HERE") {
      alert("กรุณาเข้าไปแก้รหัส GITHUB_OWNER และ GITHUB_REPO ในโค้ดก่อนครับ!");
      return;
    }

    loadGitBtn.disabled = true;
    uploadBtn.disabled = true;
    statusMsg.innerHTML = "กำลังดึงข้อมูลจาก GitHub...";
    statusMsg.style.color = "#e67e22";
    
    pngMap.clear();
    benzFiles = [];

    // เพิ่ม headers Authorization เพื่อให้อ่าน Repo แบบ Private ได้ (ถ้ามี)
    const headers = GITHUB_TOKEN && GITHUB_TOKEN.startsWith("ghp_") 
      ? { "Authorization": `token ${GITHUB_TOKEN}` } 
      : {};

    try {
      const imgRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/img`, { headers });
      if (imgRes.ok) {
        const imgList = await imgRes.json();
        imgList.forEach(file => {
          if (file.type === "file" && getExtension(file.name) === "png") {
            pngMap.set(getBaseName(file.name), { fileName: file.name, url: file.download_url });
          }
        });
      }

      const idRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/id`, { headers });
      if (idRes.ok) {
        const idList = await idRes.json();
        idList.forEach(file => {
          if (file.type === "file" && getExtension(file.name) === "benz") {
            const nameWithoutExt = getBaseName(file.name);
            const parsed = parseBenzFileName(nameWithoutExt);
            benzFiles.push({
              fullName: file.name,
              nameWithoutExt: nameWithoutExt,
              imageCode: parsed.imageCode,
              displayName: parsed.displayName,
              tags: parsed.tags,
              status: localStorage.getItem("status_" + nameWithoutExt) || "available"
            });
          }
        });
      }

      benzFiles.sort((a, b) => a.displayName.localeCompare(b.displayName, "th"));
      statusMsg.innerHTML = "✅ ดึงข้อมูลสำเร็จ!";
      statusMsg.style.color = "#2ecc71";
      renderTable();

    } catch (error) {
      console.error(error);
      statusMsg.innerHTML = "❌ เกิดข้อผิดพลาดในการดึงข้อมูล (ตรวจสอบการตั้งค่า Owner/Repo/Token ในโค้ด)";
      statusMsg.style.color = "#e74c3c";
    } finally {
      loadGitBtn.disabled = false;
      uploadBtn.disabled = false;
    }
  }

  // ระบบอัปโหลดไฟล์
  async function handleFileUpload(event) {
    const files = event.target.files;
    if (files.length === 0) return;

    if (!GITHUB_TOKEN || !GITHUB_TOKEN.startsWith("ghp_")) {
      alert("กรุณาตั้งค่า GITHUB_TOKEN ในโค้ดให้ถูกต้องก่อนทำการเพิ่มไฟล์!");
      document.getElementById('fileUploadInput').value = "";
      return;
    }

    loadGitBtn.disabled = true;
    uploadBtn.disabled = true;
    statusMsg.innerHTML = `⏳ กำลังอัปโหลด ${files.length} ไฟล์ ขึ้น GitHub...`;
    statusMsg.style.color = "#e67e22";

    let successCount = 0;

    for (const file of files) {
      const ext = getExtension(file.name);
      let folder = "";
      
      if (ext === "png") folder = "img";
      else if (ext === "benz") folder = "id";
      else continue;

      try {
        const base64Content = await fileToBase64(file);
        // Encode ชื่อไฟล์ด้วย encodeURIComponent เผื่อกรณีไฟล์ภาษาไทย
        const safeFileName = encodeURIComponent(file.name); 
        const path = `${folder}/${safeFileName}`;
        await uploadToGitHubAPI(path, base64Content);
        successCount++;
      } catch (err) {
        console.error(`Failed to upload ${file.name}:`, err);
      }
    }

    document.getElementById('fileUploadInput').value = ""; 

    if (successCount === files.length) {
      statusMsg.innerHTML = `✅ เพิ่มไฟล์สำเร็จ ${successCount} ไฟล์! กำลังรีเฟรชข้อมูล...`;
      statusMsg.style.color = "#2ecc71";
    } else {
      statusMsg.innerHTML = `⚠️ เพิ่มไฟล์สำเร็จ ${successCount}/${files.length} ไฟล์ (เช็ค Console Log หรือ Token)`;
      statusMsg.style.color = "#e74c3c";
    }

    await loadFromGitHub(); 
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = error => reject(error);
    });
  }

  async function uploadToGitHubAPI(path, base64Content) {
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
    let sha = null;
    
    // ดึงค่า SHA เดิมมาก่อน (เผื่อไฟล์มีอยู่แล้วและต้องการเขียนทับ)
    const getRes = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
    if (getRes.ok) {
      const data = await getRes.json();
      sha = data.sha;
    }

    const body = {
      message: `Add/Update file via Admin Web`,
      content: base64Content
    };
    if (sha) body.sha = sha;

    const putRes = await fetch(url, {
      method: "PUT",
      headers: {
        "Authorization": `token ${GITHUB_TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    if (!putRes.ok) throw new Error("Upload failed");
  }

  function renderTable() {
    const table = document.getElementById("resultTable");
    const tbody = document.getElementById("resultBody");

    tbody.innerHTML = "";
    if (benzFiles.length === 0) { table.style.display = "none"; updateSummary(); return; }

    table.style.display = "table";
    const search = searchInput.value.toLowerCase().trim();
    const filter = filterStatus.value;

    const filtered = benzFiles.filter(item => {
      const searchText = (item.fullName + " " + item.displayName + " " + item.imageCode + " " + item.tags.map(t => t.text).join(" ")).toLowerCase();
      const matchSearch = searchText.includes(search);
      const matchStatus = filter === "all" || item.status === filter;
      return matchSearch && matchStatus;
    });

    filtered.forEach(item => {
      const tr = document.createElement("tr");

      const imgCell = document.createElement("td");
      if (item.imageCode && pngMap.has(item.imageCode)) {
        const img = document.createElement("img");
        img.src = pngMap.get(item.imageCode).url;
        img.className = "preview-img";
        img.loading = "lazy";
        imgCell.appendChild(img);
      } else {
        const noImg = document.createElement("div");
        noImg.className = "no-img";
        noImg.innerHTML = "ไม่มีภาพ";
        imgCell.appendChild(noImg);
        const warn = document.createElement("div");
        warn.className = "warn";
        warn.textContent = item.imageCode ? `ขาด img/${item.imageCode}.png` : "ไม่พบรหัสรูป";
        imgCell.appendChild(warn);
      }
      tr.appendChild(imgCell);

      const infoCell = document.createElement("td");
      infoCell.innerHTML = `
        <div class="display-name">${escapeHtml(item.displayName)}</div>
        <div class="file-name">ไฟล์: ${escapeHtml(item.fullName)}</div>
        <div class="file-name">รหัสรูป: ${escapeHtml(item.imageCode || "-")}</div>
      `;
      tr.appendChild(infoCell);

      const tagsCell = document.createElement("td");
      item.tags.forEach(tag => {
        const span = document.createElement("span");
        span.className = "tag-badge " + tag.className;
        span.textContent = tag.text;
        tagsCell.appendChild(span);
      });
      tr.appendChild(tagsCell);

      const statusCell = document.createElement("td");
      statusCell.innerHTML = `
        <b>${item.status === "sold" ? "ขายแล้ว" : "ยังไม่ขาย"}</b>
        <div class="status-buttons">
          <button class="btn-status btn-available ${item.status === "available" ? "active-available" : ""}">ยังไม่ขาย</button>
          <button class="btn-status btn-sold ${item.status === "sold" ? "active-sold" : ""}">ขายแล้ว</button>
        </div>
      `;
      const btnAvailable = statusCell.querySelector(".btn-available");
      const btnSold = statusCell.querySelector(".btn-sold");

      btnAvailable.addEventListener("click", () => setStatus(item.nameWithoutExt, "available"));
      btnSold.addEventListener("click", () => setStatus(item.nameWithoutExt, "sold"));

      tr.appendChild(statusCell);
      tbody.appendChild(tr);
    });
    updateSummary();
  }

  function setStatus(id, status) {
    const item = benzFiles.find(x => x.nameWithoutExt === id);
    if (!item) return;
    item.status = status;
    localStorage.setItem("status_" + id, status);
    renderTable();
  }

  function updateSummary() {
    document.getElementById("benzCount").textContent = benzFiles.length;
    document.getElementById("pngCount").textContent = pngMap.size;
    document.getElementById("availableCount").textContent = benzFiles.filter(x => x.status === "available").length;
    document.getElementById("soldCount").textContent = benzFiles.filter(x => x.status === "sold").length;
  }

  function parseBenzFileName(nameWithoutExt) {
    const parts = nameWithoutExt.split("_");
    const displayParts = [];
    const tags = [];
    let imageCode = "";

    parts.forEach(part => {
      if (!part) return;
      const prefix = part.charAt(0);
      const value = part.substring(1).trim();

      if (prefix === "P" && value) { addUnique(displayParts, value); tags.push({ className: "tag-P", text: "สินค้า: " + value }); return; }
      if (prefix === "T" && value) { addUnique(displayParts, value); tags.push({ className: "tag-T", text: "ประเภท: " + value }); return; }
      if (prefix === "C" && value) { addUnique(displayParts, "C = เพชร " + value); tags.push({ className: "tag-C", text: "เพชร: " + value }); return; }
      imageCode = part.trim();
      tags.push({ className: "tag-code", text: "รหัสรูป: " + part.trim() });
    });
    return { imageCode: imageCode, displayName: displayParts.length > 0 ? displayParts.join(" + ") : nameWithoutExt, tags: tags };
  }

  function addUnique(array, value) { if (!array.includes(value)) array.push(value); }
  function getExtension(filename) { return filename.split(".").pop().toLowerCase(); }
  function getBaseName(filename) { return filename.replace(/\.[^/.]+$/, ""); }
  function escapeHtml(text) { return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
  
  // ให้โหลดอัตโนมัติเมื่อเปิดเว็บ (ถ้าใส่ข้อมูลแล้ว)
  window.onload = () => {
    if (GITHUB_OWNER !== "copp0021" && GITHUB_REPO !== "cookierunkub") {
      loadFromGitHub();
    }
  }
</script>

</body>
</html>
